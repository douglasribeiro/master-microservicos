name: Microservices Continuos Deployment with Github actions
on:
  push:
    branches: 
    - "main"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{secrets.DOCKER_USERNAME}}
        password: ${{secrets.DOCKER_ACCESS_TOKEN}}

    - name: Setup Java 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'adopt'

    - name: Bulid Eureka Naming Server Docker Image
      working-directory: ./naming-server
      run: mvn spring-boot:build-image

    - name: Bulid API Geateway Docker Image
      working-directory: ./api-gateway
      run: mvn spring-boot:build-image

    - name: Bulid Exchange Microservices Docker Image
      working-directory: ./exchange-service
      run: mvn clean package

    - name: Bulid Book Microservices Docker Image
      working-directory: ./book-service
      run: mvn clean package

    - name: Docker Compose Build
      working-directory: ./naming-server
      run: docker compose build
    