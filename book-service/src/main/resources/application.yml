server:
  port: 8100
management:
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
#eureka:
#  client:
#    service-url:
#      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka}
resilience4j:
  ratelimiter:
    instances:
      default:
        limit-for-period: 2
        limit-refresh-period: 10s 
  retry:
    instances:
      foo-bar:
        max-attempts: 7
        wait-duration: 1s
        enable-exponential-backoff: true
spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: book-service
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3310/book_service
    username: docker
    password: admin123
  jpa:
    hibernate: 
      ddl-auto: none
    properties:
      hibernate:
    show-sql: true
    open-in-view: false
  managament:
    tracing:
      sampling:
        probability: 1.0
#  zikin:
#    base-url: ${SPRING_ZIPKIN_BASEURL:http://localhost:9411}
springdoc:
  api-docs: 
    path: /book-service/v3/api-docs
  swagger-ui:
    url: /book-service/v3/api-docs      
  override-server-url: true